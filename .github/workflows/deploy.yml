name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude .git --exclude deploy.sh --exclude .github
          path: ./
          remote_path: ~/domains/rollingcatsoftware.com/public_html/
          remote_host: 46.202.158.52
          remote_port: 65002
          remote_user: u349700627
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
